context.modules = [
  {
    name = libpipewire-module-filter-chain
    args = {
      node.description = "Noise Suppressed Blue Yeti Mic"
      media.name       = "Noise Suppressed Blue Yeti Mic"
      filter.graph = {
        # nodes = [
        #   {
        #     type    = ladspa
        #     name    = rnnoise
        #     plugin  = /usr/lib/ladspa/librnnoise_ladspa.so
        #     label   = noise_suppressor_mono
        #     control = {
        #       "VAD Threshold (%)" = 90.0
        #     }
        #   }
        # ]
        nodes = [
          {
            type    = ladspa
            name    = deepfilter
            plugin  = /usr/lib/ladspa/libdeep_filter_ladspa.so
            label   = deep_filter_mono
            control = {
              "Attenuation Limit (dB)" = 100
            }
          }
        ]
      }

      capture.props = {
        node.name        = "capture.rnnoise_source"
        node.passive     = true        # critical: won't hold Yeti awake alone
        target.object    = "blue_yeti_mic_input"
        audio.rate       = 48000
        audio.channels   = 1
        audio.position   = [ MONO ]
      }

      playback.props = {
        node.name        = "rnnoise_source"
        media.class      = "Audio/Source"
        node.description = "Noise Suppressed Blue Yeti Mic"
        audio.rate       = 48000
        audio.channels   = 1
        audio.position   = [ MONO ]
      }
    }
  }
]
